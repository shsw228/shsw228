name: リリース済みアプリを更新

on:
  schedule:
    # 毎月1日 00:00 UTC（JST 09:00）
    - cron: "0 0 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # アプリ欄は iTunes API のみで完結するため PAT 不要
      - name: README を更新
        run: python3 scripts/update_projects.py --only apps

      - name: 変更があればコミット
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "[chore] リリース済みアプリを自動更新"
            git push
          else
            echo "変更なし"
          fi
