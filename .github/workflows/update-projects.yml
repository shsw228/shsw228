name: 直近プロジェクトを更新

on:
  schedule:
    # 毎週月曜 00:00 UTC（JST 月曜 09:00）
    - cron: "0 0 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: README を更新
        env:
          # private リポも列挙するため repo スコープの PAT を使う。
          # 既定の GITHUB_TOKEN では profile リポしか見えないので不可。
          # リポジトリの Secrets に PROFILE_TOKEN を登録すること。
          GH_TOKEN: ${{ secrets.PROFILE_TOKEN }}
        run: python3 scripts/update_projects.py --only recent

      - name: 変更があればコミット
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "[chore] 直近活動プロジェクトを自動更新"
            git push
          else
            echo "変更なし"
          fi
